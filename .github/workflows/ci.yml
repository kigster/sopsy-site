name: CI

# Verify the site formats, type-checks, and builds on every push/PR.
# Deployment is handled out-of-band (rsync to nginx) — see `just deploy`.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check formatting (Prettier)
        run: bun run format:check

      - name: Type-check (astro check)
        run: bun run check

      - name: Build
        run: bun run build
